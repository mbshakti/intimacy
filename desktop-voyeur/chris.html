<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>chris</title>
    <style>
        @font-face {
            font-family: 'Flaco';
            src: url('font/flaco/flaco-regular.otf') format('opentype');
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .screen {
            aspect-ratio: 16 / 9;
            width: min(100vw, calc(100vh * 16 / 9));
            background: #110B11;
            position: relative;
            overflow: hidden;
        }

        .center {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        canvas {
            display: block;
            cursor: pointer;
            opacity: 0.6;
            transition: opacity 120ms;
        }
        canvas:hover { opacity: 1; }

        .chris-block {
            position: absolute;
            bottom: 28px;
            right: 36px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
        }

        .chris-block img {
            width: 44px;
            height: 44px;
            object-fit: contain;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
            filter: drop-shadow(0 2px 6px rgba(0,0,0,0.5));
        }

        .chris-block .label {
            font-family: 'Andale Mono', monospace;
            font-size: 11px;
            color: #F9F8F8;
            text-align: center;
            text-transform: uppercase;
            max-width: 140px;
            line-height: 1.4;
            margin-top: 8px;
            text-shadow: 0 1px 4px rgba(0,0,0,0.8);
        }

        .chris-block .meta-group {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0;
            margin-top: 4px;
        }

        .chris-block .meta {
            font-family: 'Flaco', Verdana, sans-serif;
            font-size: 11px;
            color: rgba(226,225,225,0.34);
            text-align: center;
            line-height: 1.4;
            text-shadow: 0 1px 4px rgba(0,0,0,0.8);
        }
    </style>
</head>
<body>

<div class="screen">
    <div class="center">
        <canvas id="wv" width="200" height="20" onclick="toggle()"></canvas>
    </div>

    <div class="chris-block">
        <img src="img/anime-bitmap/chris.png" alt="">
        <div class="label">chris's take on AI girlfriends</div>
        <div class="meta-group">
            <span class="meta">Chris, AI researcher</span>
        </div>
    </div>
</div>

<audio id="aud" src="chris/chris, AI waifus.mp3" preload="metadata"></audio>

<script>
    const canvas = document.getElementById('wv');
    const cx     = canvas.getContext('2d');
    const aud    = document.getElementById('aud');
    const W = canvas.width;
    const H = canvas.height;

    let actx     = null;
    let analyser = null;
    let tdData   = null;
    let playing  = false;
    let tick     = 0;

    function init() {
        if (actx) return;
        actx = new (window.AudioContext || window.webkitAudioContext)();
        analyser = actx.createAnalyser();
        analyser.fftSize = 512;
        analyser.smoothingTimeConstant = 0.85;
        tdData = new Uint8Array(analyser.fftSize);
        actx.createMediaElementSource(aud).connect(analyser);
        analyser.connect(actx.destination);
    }

    function toggle() {
        init();
        if (actx.state === 'suspended') actx.resume();
        if (playing) {
            aud.pause();
            playing = false;
        } else {
            aud.play();
            playing = true;
        }
    }

    aud.addEventListener('ended', () => { playing = false; });

    function draw() {
        requestAnimationFrame(draw);
        cx.clearRect(0, 0, W, H);
        tick += 0.014;

        cx.beginPath();
        cx.lineWidth = 1;
        cx.strokeStyle = playing ? 'rgba(144,241,239,0.85)' : 'rgba(249,248,248,0.3)';

        if (playing && analyser) {
            analyser.getByteTimeDomainData(tdData);
            for (let i = 0; i < tdData.length; i++) {
                const x = (i / (tdData.length - 1)) * W;
                const y = ((tdData[i] / 128) - 1) * (H * 0.45) + H / 2;
                i === 0 ? cx.moveTo(x, y) : cx.lineTo(x, y);
            }
        } else {
            for (let i = 0; i <= W; i++) {
                const v = Math.sin((i / W) * Math.PI * 5 + tick) * 0.07
                        + Math.sin((i / W) * Math.PI * 9 + tick * 0.6) * 0.03;
                const y = (0.5 + v) * H;
                i === 0 ? cx.moveTo(i, y) : cx.lineTo(i, y);
            }
        }

        cx.stroke();
    }

    draw();
</script>
</body>
</html>
